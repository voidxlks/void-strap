<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>void-strap vXLKS</title>

<style>
  body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0000, #000000);
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .panel {
    background: rgba(20, 0, 0, 0.6);
    border: 1px solid #ff1a1a;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px #ff0000;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  h1 {
    color: #ff3333;
    margin-bottom: 10px;
  }

  p {
    color: #ff6666;
    font-size: 14px;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #ff1a1a;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px #ff0000;
    transition: 0.2s;
  }

  button:hover {
    background: #ff4d4d;
    box-shadow: 0 0 20px #ff0000;
  }

  /* Floating blob */
  svg {
    position: absolute;
    width: 500px;
    opacity: 0.4;
    filter: blur(40px);
  }

</head>
